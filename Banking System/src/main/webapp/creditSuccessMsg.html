<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success Page</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #3498db; /* Blue background from the image */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .modal {
            width: 350px;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        .header {
            background-color: #78c25d; /* Green color from image */
            padding: 40px 20px;
            color: white;
        }

        .icon-circle {
            width: 80px;
            height: 80px;
            border: 4px solid white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 15px;
            font-size: 40px;
            font-weight: bold;
        }

        .success-text {
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 22px;
            font-weight: bold;
        }

        .content {
            padding: 30px 20px;
        }

        .message {
            color: #666;
            font-size: 18px;
            line-height: 1.4;
            margin-bottom: 30px;
        }

        .btn-continue {
            display: inline-block;
            background-color: #a8e094; /* Lighter green for button */
            color: white;
            padding: 12px 40px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 600;
            font-size: 18px;
            border: none;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .btn-continue:hover {
            background-color: #92d17c;
        }
    </style>
</head>
<body>

    <div class="modal">
        <div class="header">
            <div class="icon-circle">✓</div>
            <div class="success-text">SUCCESS</div>
        </div>
        <div class="content">
            <p class="message">
                Congratulations, your account<br>
                has been successfully created.
            </p>
            <button class="btn-continue"><a href="userHome.jsp" style="color:white;">Continue</a></button>
        </div>
    </div>

</body>
</html>
